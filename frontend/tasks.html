<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orchestra — Analytics & Insights</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=Google+Sans+Display:wght@400;500;700&family=Google+Sans+Mono&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --g-blue:        #1a73e8;
  --g-blue-light:  #e8f0fe;
  --g-green:       #137333;
  --g-green-light: #e6f4ea;
  --g-green-mid:   #1e8e3e;
  --g-amber:       #b06000;
  --g-amber-light: #fef7e0;
  --g-red:         #d93025;
  --g-red-light:   #fce8e6;
  --g-teal:        #007b83;
  --g-teal-light:  #e4f7f7;
  --g-violet:      #7c4dff;
  --g-violet-light:#ede7f6;

  --md-bg:         #f8f9fa;
  --md-surface:    #ffffff;
  --md-surface-1:  #f1f3f4;
  --md-surface-2:  #e8eaed;
  --md-surface-3:  #dadce0;
  --md-on-surface: #202124;
  --md-muted:      #5f6368;
  --md-dim:        #9aa0a6;

  --shadow-1: 0 1px 2px rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15);
  --shadow-2: 0 1px 2px rgba(60,64,67,.3), 0 2px 6px 2px rgba(60,64,67,.15);

  --font-body:    'Google Sans', 'Roboto', sans-serif;
  --font-display: 'Google Sans Display', 'Google Sans', sans-serif;
  --font-mono:    'Google Sans Mono', 'Roboto Mono', monospace;

  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
  --radius-xl: 24px; --radius-full: 100px;

  --glass-bg:     rgba(255,255,255,0.72);
  --glass-border: rgba(255,255,255,0.55);
}

html.dark {
  --g-blue:        #8ab4f8; --g-blue-light:  #1a2e4a;
  --g-green:       #81c995; --g-green-light: #1b3a27;
  --g-amber:       #fdd663; --g-amber-light: #3a2a00;
  --g-red:         #f28b82; --g-red-light:   #3c1f1e;
  --g-violet:      #c58af9; --g-violet-light:#2d1f4a;
  --md-bg:         #1c1b1f; --md-surface:    #2d2c31;
  --md-surface-1:  #37363b; --md-surface-2:  #414046;
  --md-surface-3:  #4e4d53; --md-on-surface: #e3e2e6;
  --md-muted:      #9e9da2; --md-dim:        #6e6d72;
  --shadow-1: 0 1px 3px rgba(0,0,0,.5), 0 1px 4px 1px rgba(0,0,0,.3);
  --glass-bg:     rgba(30,29,35,0.78); --glass-border: rgba(255,255,255,0.10);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  background: var(--md-bg); color: var(--md-on-surface);
  font-family: var(--font-body);
  height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* Mesh background */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 60% at 5%  15%,  rgba(66,133,244,0.14) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 95% 10%,  rgba(52,168,83,0.11)  0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 85% 85%,  rgba(251,188,4,0.09)  0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 50% 50%,  rgba(124,77,255,0.07) 0%, transparent 60%);
  animation: meshDrift 22s ease-in-out infinite alternate;
}
@keyframes meshDrift {
  0%   { transform: scale(1) translate(0,0); }
  100% { transform: scale(1.02) translate(5px,-5px); }
}

.ms { font-family: 'Material Symbols Rounded'; font-size: 18px; line-height: 1; vertical-align: middle; }
.ms.sm { font-size: 15px; }

/* Topbar */
.topbar {
  position: relative; z-index: 10;
  background: var(--glass-bg); backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--glass-border);
  padding: 0 24px; height: 56px;
  display: flex; align-items: center; gap: 16px;
  box-shadow: var(--shadow-1); flex-shrink: 0;
}
.tb-back {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: var(--radius-full);
  border: 1px solid var(--md-surface-3); background: none;
  font-family: var(--font-body); font-size: 12px; font-weight: 600;
  color: var(--md-muted); cursor: pointer; transition: all 0.15s;
}
.tb-back:hover { background: var(--md-surface-1); color: var(--md-on-surface); }
.tb-divider { width: 1px; height: 20px; background: var(--md-surface-3); }
.tb-title { font-family: var(--font-display); font-size: 16px; font-weight: 700; flex: 1; }
.tb-meta { font-family: var(--font-mono); font-size: 11px; color: var(--md-muted); background: var(--md-surface-1); padding: 4px 12px; border-radius: var(--radius-full); }

/* Main Dashboard */
.dashboard-container {
  position: relative; z-index: 1;
  flex: 1; overflow-y: auto; padding: 32px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-auto-rows: minmax(300px, auto);
  gap: 24px;
  max-width: 1400px; margin: 0 auto; width: 100%;
}

.chart-card {
  background: var(--glass-bg);
  backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 24px;
  box-shadow: var(--shadow-1);
  display: flex; flex-direction: column;
}

.chart-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 24px;
}
.ch-title { font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--md-on-surface); }
.ch-subtitle { font-size: 13px; color: var(--md-muted); margin-top: 4px; }
.ch-icon { padding: 8px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }

.chart-body { flex: 1; position: relative; min-height: 250px; }

/* Wide card */
.chart-card.wide { grid-column: span 2; }
</style>
</head>
<body>

<div class="topbar">
  <button class="tb-back" onclick="window.location.href='/'"><span class="ms sm">arrow_back</span> Dashboard</button>
  <div class="tb-divider"></div>
  <div class="tb-title">All Tasks & Timelines</div>
  <div class="tb-meta" id="tbMeta">Loading tasks...</div>
</div>

<div class="dashboard-container" style="display:flex; flex-direction:column;">
  <div class="chart-card wide" style="flex:1;">
    <div class="chart-header">
      <div>
        <div class="ch-title">Active Task Board</div>
        <div class="ch-subtitle">Comprehensive list of all orchestrated tasks</div>
      </div>
      <div class="ch-icon" style="background:var(--g-blue-light);color:var(--g-blue);"><span class="ms">task_alt</span></div>
    </div>
    <div class="chart-body" id="tasksBody" style="overflow-y:auto; display:flex; flex-direction:column; gap:12px;">
      <!-- Tasks populate here -->
    </div>
  </div>
</div>

<script>
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.classList.add('dark');
  }

  async function loadTasks() {
    const body = document.getElementById('tasksBody');
    try {
      const res = await fetch('/api/tasks');
      if (!res.ok) throw new Error('Network response was not ok');
      const data = await res.json();

      document.getElementById('tbMeta').textContent = `${data.count || 0} Total Tasks`;

      if (!data.tasks || data.tasks.length === 0) {
        body.innerHTML = '<div style="text-align:center; padding:40px; color:var(--md-dim);">No tasks found in database.</div>';
        return;
      }
      
      body.innerHTML = data.tasks.map(t => {
        const statusColor = t.status === 'completed' ? 'var(--g-green)' : (t.status === 'in_progress' ? 'var(--g-blue)' : 'var(--g-amber)');
        const statusBg = t.status === 'completed' ? 'var(--g-green-light)' : (t.status === 'in_progress' ? 'var(--g-blue-light)' : 'var(--g-amber-light)');
        const pLabel = t.priority ? t.priority.toUpperCase() : 'MEDIUM';
        const tDate = t.created_at ? new Date(t.created_at).toLocaleDateString() : 'N/A';
        const dueStr = t.due_date ? `Due: ${new Date(t.due_date).toLocaleDateString()}` : 'No due date';
        return `
          <div style="background:var(--md-surface-1); border:1px solid var(--md-surface-2); border-radius:8px; padding:16px; display:flex; gap:16px; align-items:flex-start;">
            <div style="background:${statusBg}; color:${statusColor}; padding:8px; border-radius:8px; align-items:center; justify-content:center; display:flex;">
              <span class="ms">${t.status === 'completed' ? 'check_circle' : 'pending_actions'}</span>
            </div>
            <div style="flex:1;">
              <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                <div style="font-weight:600; font-size:15px; color:var(--md-on-surface);">${t.title}</div>
                <div style="font-size:12px; font-weight:600; background:var(--md-surface-2); padding:2px 8px; border-radius:12px;">${pLabel}</div>
              </div>
              <div style="font-size:13px; color:var(--md-muted); margin-bottom:8px;">${t.description || 'No description provided.'}</div>
              <div style="display:flex; gap:16px; font-size:12px; color:var(--md-dim);">
                <span style="display:flex; align-items:center; gap:4px;"><span class="ms sm">calendar_today</span> Created: ${tDate}</span>
                <span style="display:flex; align-items:center; gap:4px;"><span class="ms sm">schedule</span> ${dueStr}</span>
                <span style="display:flex; align-items:center; gap:4px;"><span class="ms sm">account_tree</span> Subtasks: ${t.subtasks || 0}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');

    } catch (e) {
      console.error('Error fetching tasks:', e);
      document.getElementById('tbMeta').textContent = 'Error loading data';
      body.innerHTML = '<div style="color:var(--g-red); padding:20px;">Failed to load tasks from DB.</div>';
    }
  }

  window.addEventListener('DOMContentLoaded', loadTasks);
</script>
</body>
</html>
